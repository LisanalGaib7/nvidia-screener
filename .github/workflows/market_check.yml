name: 📊 Market Close Data Check

on:
  schedule:
    # 21:30 UTC = 5:30 PM EDT (여름) / 4:30 PM EST (겨울) — 마감 후 30~90분
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  check-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run data check
        id: data_check
        run: python scripts/check_data.py

      - name: Telegram 알림 (이상 감지 시)
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
        run: |
          RESULT=$(cat check_result.txt 2>/dev/null || echo "상세 오류 파일 없음")
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="$(printf '📊 *NVIDIA Tracker — 데이터 이상 감지*\n\n⏰ %s\n\n%s\n\n🔍 [Actions 로그](https://github.com/%s/actions)' "$NOW" "$RESULT" "$REPO")"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=Markdown"
