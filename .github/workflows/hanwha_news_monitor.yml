name: 🟠 한화엔진 수주·계약 감지

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  monitor-hanwha-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: 한화엔진 수주·계약 뉴스 확인
        id: hanwha_news_check
        run: python scripts/check_hanwha_news.py

      - name: Telegram 알림 (뉴스 감지 시)
        if: steps.hanwha_news_check.outputs.found == 'true'
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG=$(cat hanwha_news_alert.txt)
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"
