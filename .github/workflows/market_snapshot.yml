name: 📈 일일 시세 스냅샷

on:
  schedule:
    # 매일(월~금) 23:00 UTC = 한국 오전 8시 — 미국장 마감(21:00 UTC) 후 충분히 안정화된 시점
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance==1.3.0

      - name: Fetch market snapshot
        id: fetch
        run: python scripts/fetch_market_data.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          if git diff --staged --quiet; then
            echo "No change in snapshot."
          else
            git commit -m "chore: daily market data snapshot [skip ci]"
            git push
          fi

      # 스냅샷 갱신 실패 시 나에게만 알림 (사이트엔 표시 안 됨).
      # 여기서 failure()는 정당함 — '일일 스냅샷이 실제로 갱신되지 않음'이라는
      # 진짜 알려야 할 상황 (SEC 403 같은 예상된 반복 조건과 다름).
      - name: Telegram 알림 (스냅샷 실패 시)
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="$(printf '⚠️ *NVIDIA Tracker — 시세 스냅샷 갱신 실패*\n\n⏰ %s\n\n오늘 시세 데이터가 업데이트되지 않았습니다. 사이트는 직전 스냅샷을 계속 표시 중입니다.\n\n🔍 [Actions 로그](https://github.com/%s/actions/runs/%s)' "$NOW" "$REPO" "$RUN_ID")"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            -d "parse_mode=Markdown"
