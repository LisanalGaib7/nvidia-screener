name: 📈 일일 시세 스냅샷

on:
  schedule:
    # 매일(월~금) 23:00 UTC = 한국 오전 8시 — 미국장 마감(21:00 UTC) 후 충분히 안정화된 시점
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance==1.3.0

      - name: Fetch market snapshot
        run: python scripts/fetch_market_data.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          if git diff --staged --quiet; then
            echo "No change in snapshot."
          else
            git commit -m "chore: daily market data snapshot [skip ci]"
            git push
          fi
